steps:
  - name: 📥 Baixar o código do repositório
    uses: actions/checkout@v4

  - name: 🟢 Preparar o Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '18'

  - name: ☕ Preparar o Java (Android Studio)
    uses: actions/setup-java@v4
    with:
      distribution: 'zulu'
      java-version: '17'

  - name: 📦 Instalar dependências do projeto
    run: npm install

  - name: 🏗️ Construir o aplicativo Web (React)
    run: npm run build

  - name: 📱 Converter para Android (Capacitor)
    run: |
      npx cap add android || true
      npx cap sync android

  - name: ⚙️ Gerar o arquivo .APK
    working-directory: ./android
    run: bash ./gradlew assembleDebug

  - name: 🚀 Entregar o APK pronto
    uses: actions/upload-artifact@v4
    with:
      name: GabaritoPro-App
      path: android/app/build/outputs/apk/debug/app-debug.apk
